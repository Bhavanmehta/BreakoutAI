name: Daily breakout scan (US)

# US parallel to daily-scan.yml -- same "zero-backend" heartbeat, same pipeline
# (backend/run_scan.py), just BREAKOUTAI_MARKET=US so settings.py's market branch
# points everything at data/us/* and US-appropriate sources/thresholds instead.
# News is deliberately NOT run here yet (explicitly deferred); Social IS (ApeWisdom +
# Google Trends need no credentials for the US market, unlike India's still-unresolved
# Reddit app requirement).
on:
  schedule:
    # 21:30 UTC = 4:30pm EDT / 5:30pm EST, safely after the 4pm ET US market close
    # year-round without needing to special-case daylight saving.
    - cron: "30 21 * * 1-5"
  workflow_dispatch: {}   # lets you trigger it by hand from the Actions tab

permissions:
  contents: write         # needed so the job can commit the refreshed JSON

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 90     # fetch budget below is 60 min; +install/publish stays well under this
    env:
      BREAKOUTAI_MARKET: US
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Restore forward-only ledgers from the `data` branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # See daily-scan.yml for the full rationale: the append-only performance /
          # track-record ledgers are gitignored (they live on the orphan `data` branch),
          # so a fresh checkout has none and the ledger reset to "today only" every run.
          # Pull the previous US copies (under us/) into data/us/ so the scan accumulates.
          set -euo pipefail
          REPO_URL="https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          PREV="$(mktemp -d)"
          if git clone --depth 1 --branch data "$REPO_URL" "$PREV/d" 2>/dev/null; then
            mkdir -p data/us
            # See daily-scan.yml for the full rationale. Beyond the append-only ledgers,
            # restore the slow-changing reference enrichments (fundamentals/sectors/
            # holdings/earnings) that run_scan.py merges only `if <file>.exists()`: they're
            # produced out-of-band by fetch_*.py (not run here) and live only on the `data`
            # branch, so without this every US stock ships fundamentals: null and the
            # site's fundamentals/collection filters match nothing. Guarded per file, so
            # names not (yet) published for US are simply skipped.
            for f in performance.json track_record.json predictions_log.jsonl \
                     fundamentals.json sectors.json holdings.json earnings.json; do
              [ -f "$PREV/d/us/$f" ] && cp "$PREV/d/us/$f" "data/us/$f" || true
            done
          fi

      - name: Run the pipeline
        working-directory: backend
        env:
          # US universe is ~4260 names and yfinance batches at ~0.59s/symbol, so a
          # full scan needs ~42 min. The default 25-min budget cut it off early at
          # 2575/4260 (run #29873833707, 2026-07-21). 60 min covers the whole
          # universe with headroom for backoff/retry variance -- and since the
          # budget is a *cap*, a clean day still finishes in ~42 min and exits.
          FETCH_BUDGET_SEC: "3600"
        run: python run_scan.py

      - name: Fetch social buzz (ApeWisdom + Google Trends -- no credentials needed for US)
        working-directory: backend
        run: python fetch_social.py

      - name: Publish serving data to the `data` branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # US mirror of the publish step in daily-scan.yml -- force-push US files (under
          # us/) onto the shared orphan `data` branch as a single fresh commit, preserving
          # India's root-level files. India and US run ~11h apart so they never race.
          set -euo pipefail
          REPO_URL="https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          PUB="$(mktemp -d)"
          git clone --depth 1 --branch data "$REPO_URL" "$PUB/cur" 2>/dev/null && \
            cp -r "$PUB/cur/." "$PUB/pub" || mkdir -p "$PUB/pub"
          rm -rf "$PUB/pub/.git"
          mkdir -p "$PUB/pub/us"
          cp data/us/breakouts.json data/us/track_record.json data/us/performance.json \
             data/us/predictions_log.jsonl "$PUB/pub/us/"
          [ -f data/us/social.json ] && cp data/us/social.json "$PUB/pub/us/" || true
          # Reference enrichments: preserved by the clone-forward above; re-copy any that
          # exist locally so an out-of-band refresh (fetch_fundamentals.py etc.) propagates.
          for f in fundamentals.json sectors.json holdings.json earnings.json; do
            [ -f "data/us/$f" ] && cp "data/us/$f" "$PUB/pub/us/" || true
          done
          rm -rf "$PUB/pub/us/ohlc" && cp -r data/us/ohlc "$PUB/pub/us/ohlc"
          cd "$PUB/pub"
          git init -q && git checkout -q -b data
          git add -A
          if git -c user.name=breakoutai-bot -c user.email=actions@github.com \
               commit -q -m "data(US): $(date -u +'%Y-%m-%d %H:%MZ')"; then
            git push -f "$REPO_URL" data
          else
            echo "No data changes — nothing to publish."
          fi
