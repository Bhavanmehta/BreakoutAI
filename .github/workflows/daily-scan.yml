name: Daily breakout scan

# The "zero-backend" heartbeat: this runs on a schedule (and can be run manually),
# regenerates data/breakouts.json, and commits it back so the site auto-updates.
on:
  schedule:
    # 10:30 UTC = 16:00 IST, ~30 min after the Indian market close (Mon–Fri).
    - cron: "30 10 * * 1-5"
  workflow_dispatch: {}   # lets you trigger it by hand from the Actions tab

permissions:
  contents: write         # needed so the job can commit the refreshed JSON

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run the pipeline
        working-directory: backend
        run: python run_scan.py

      - name: Fetch news & sentiment (Google News RSS always runs; APIs are optional, need secrets)
        working-directory: backend
        env:
          MARKETAUX_API_KEY: ${{ secrets.MARKETAUX_API_KEY }}
          NEWSDATA_API_KEY: ${{ secrets.NEWSDATA_API_KEY }}
          GNEWS_API_KEY: ${{ secrets.GNEWS_API_KEY }}
        run: python fetch_news.py

      - name: Commit updated results (if changed)
        run: |
          git config user.name "breakoutai-bot"
          git config user.email "actions@github.com"
          git add data/breakouts.json data/track_record.json data/ohlc data/news.json data/fii_dii_history.json
          if git diff --cached --quiet; then
            echo "No changes — nothing to commit."
          else
            git commit -m "chore: daily breakout scan $(date -u +'%Y-%m-%d')"
            git push
          fi
