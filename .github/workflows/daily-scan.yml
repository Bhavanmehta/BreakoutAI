name: Daily breakout scan

# The "zero-backend" heartbeat: this runs on a schedule (and can be run manually),
# regenerates data/breakouts.json, and commits it back so the site auto-updates.
on:
  schedule:
    # 10:30 UTC = 16:00 IST, ~30 min after the Indian market close (Mon–Fri).
    - cron: "30 10 * * 1-5"
  workflow_dispatch: {}   # lets you trigger it by hand from the Actions tab

permissions:
  contents: write         # needed so the job can commit the refreshed JSON

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Restore forward-only ledgers from the `data` branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # The performance/track-record ledgers are append-only DIARIES that must
          # persist across runs (build_performance/track load the prior file, append
          # today, rewrite). They're gitignored -- serving data lives on the orphan
          # `data` branch -- so a fresh checkout of main has none, and without this the
          # ledger reset to "today only" every run (past days were pushed to the branch
          # but never read back). Pull the previous copies into data/ so the scan
          # accumulates onto them and republishes the union.
          set -euo pipefail
          REPO_URL="https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          PREV="$(mktemp -d)"
          if git clone --depth 1 --branch data "$REPO_URL" "$PREV/d" 2>/dev/null; then
            mkdir -p data
            # Three kinds of gitignored, branch-resident data must be pulled back into data/
            # before run_scan.py, or a fresh CI checkout silently loses them:
            #   (a) append-only ledgers — loaded, appended to, and rewritten each run;
            #   (b) slow-changing reference enrichments (fundamentals/sectors/holdings/
            #       earnings) produced OUT-OF-BAND by their own fetch_*.py scripts, which
            #       do NOT run in this daily job. run_scan.py merges them only `if
            #       <file>.exists()`; without this restore they don't exist in CI, so every
            #       stock ships fundamentals: null / sector: "" and the site's fundamentals,
            #       collection and sector filters all match nothing. (They persist on the
            #       branch via the publish step's clone-forward; this is the read side.)
            #   (c) breakouts.json — universe.py's _universe_from_last_scan() reads this as
            #       the graceful-degradation fallback when today's bhavcopy/discovery fetch
            #       fails (NSE/exchange blocking CI IPs etc). Without restoring it here, that
            #       fallback path can never find a prior scan and drops straight to the tiny
            #       hardcoded FALLBACK_WATCHLIST instead of reusing ~yesterday's universe.
            for f in performance.json track_record.json predictions_log.jsonl \
                     fundamentals.json sectors.json holdings.json earnings.json \
                     breakouts.json; do
              [ -f "$PREV/d/$f" ] && cp "$PREV/d/$f" "data/$f" || true
            done
          fi

      - name: Run the pipeline
        working-directory: backend
        run: python run_scan.py

      - name: Fetch news & sentiment (Google News RSS always runs; APIs are optional, need secrets)
        working-directory: backend
        env:
          MARKETAUX_API_KEY: ${{ secrets.MARKETAUX_API_KEY }}
          NEWSDATA_API_KEY: ${{ secrets.NEWSDATA_API_KEY }}
          GNEWS_API_KEY: ${{ secrets.GNEWS_API_KEY }}
        run: python fetch_news.py

      - name: Publish serving data to the `data` branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # The serving JSON no longer lands on `main` (that grew ~6k files/day). Instead
          # it lives on an orphan `data` branch that we FORCE-PUSH as a single fresh commit
          # each run, so the branch (and the repo) never accumulates history. The frontend
          # fetches it from raw.githubusercontent.com/.../data/. See DATA_BASE in the HTML.
          set -euo pipefail
          REPO_URL="https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          PUB="$(mktemp -d)"
          # Start from the branch's current contents so the US job's files (under us/)
          # survive; if the branch doesn't exist yet, start empty.
          git clone --depth 1 --branch data "$REPO_URL" "$PUB/cur" 2>/dev/null && \
            cp -r "$PUB/cur/." "$PUB/pub" || mkdir -p "$PUB/pub"
          rm -rf "$PUB/pub/.git"
          # Overlay this run's fresh India artifacts. The branch mirrors data/ with the
          # data/ prefix stripped, so India files sit at the root, US under us/. The ohlc
          # tree is swapped wholesale (rm+cp, no rsync dependency) so stale symbols drop.
          cp data/breakouts.json data/track_record.json data/performance.json \
             data/predictions_log.jsonl "$PUB/pub/"
          [ -f data/news.json ] && cp data/news.json "$PUB/pub/" || true
          [ -f data/fii_dii_history.json ] && cp data/fii_dii_history.json "$PUB/pub/" || true
          # Slow-changing reference enrichments are preserved on the branch by the
          # clone-forward above; re-copy any that exist locally so an out-of-band refresh
          # (fetch_fundamentals.py / fetch_sectors.py / etc.) propagates instead of the
          # branch silently pinning the first-ever copy forever.
          for f in fundamentals.json sectors.json holdings.json earnings.json; do
            [ -f "data/$f" ] && cp "data/$f" "$PUB/pub/" || true
          done
          rm -rf "$PUB/pub/ohlc" && cp -r data/ohlc "$PUB/pub/ohlc"
          cd "$PUB/pub"
          git init -q && git checkout -q -b data
          git add -A
          if git -c user.name=breakoutai-bot -c user.email=actions@github.com \
               commit -q -m "data(IN): $(date -u +'%Y-%m-%d %H:%MZ')"; then
            git push -f "$REPO_URL" data
          else
            echo "No data changes — nothing to publish."
          fi
