<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BreakoutAI — Market Map · Design Mockup</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d1319; --panelbg:#0f171f; --line:#1c2733; --line2:#161f29; --hover:#223140;
  --txt:#e8edf2; --dim:#93a5b6; --micro:#5b6b7a;
  --mint:#3fc1ab; --mint2:#5cd8c2; --on-accent:#06110f;
  --amber:#f0b429; --red:#ef6b6b;
}
*{box-sizing:border-box}
html,body{height:100%}
body{margin:0;background:var(--bg);color:var(--txt);font:14px/1.45 'Instrument Sans',sans-serif;overflow:hidden}
.mono{font-family:'JetBrains Mono',monospace}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer}

/* ---------- header ---------- */
header{display:flex;align-items:center;gap:22px;padding:12px 20px;border-bottom:1px solid var(--line2)}
.brand{display:flex;align-items:baseline;gap:9px;font-weight:700;font-size:15px;white-space:nowrap}
.logo-dot{width:9px;height:9px;border-radius:50%;background:var(--mint);display:inline-block;align-self:center;animation:blip 2.6s infinite}
.brand .sub{font:500 10px 'JetBrains Mono',monospace;letter-spacing:.14em;color:var(--micro)}
.views{display:flex;gap:6px}
.chip{padding:5px 12px;border:1px solid #1f2a36;border-radius:7px;font-size:12.5px;color:var(--dim);transition:border-color .15s,color .15s}
.chip:hover{border-color:var(--mint);color:var(--txt)}
.chip.on{background:var(--mint);border-color:var(--mint);color:var(--on-accent);font-weight:600}
.status{margin-left:auto;display:flex;align-items:center;gap:8px;font-size:12px;color:var(--dim);white-space:nowrap}
.live{width:7px;height:7px;border-radius:50%;background:var(--mint);animation:livedot 1.6s infinite}

/* ---------- stats + legend ---------- */
.stats{display:flex;align-items:center;gap:26px;padding:10px 20px;border-bottom:1px solid var(--line2);flex-wrap:wrap}
.stat{display:flex;flex-direction:column;gap:1px}
.stat .k{font:700 17px 'JetBrains Mono',monospace}
.stat .l{font:500 9.5px 'JetBrains Mono',monospace;letter-spacing:.14em;color:var(--micro)}
.legend{margin-left:auto;display:flex;gap:6px;flex-wrap:wrap}
.lg{display:flex;align-items:center;gap:6px;padding:4px 9px;border:1px solid #1f2a36;border-radius:6px;
    font:500 10px 'JetBrains Mono',monospace;letter-spacing:.1em;color:var(--dim);transition:opacity .2s,border-color .15s}
.lg:hover{border-color:var(--mint)}
.lg.off{opacity:.32}
.lg i{width:8px;height:8px;border-radius:2px;display:inline-block}

/* ---------- map ---------- */
main{position:relative;height:calc(100vh - 111px)}
#map{position:absolute;inset:10px 14px 14px}
.sector{position:absolute;border:1px solid var(--line2);border-radius:8px;background:#0e151c}
.sector-label{position:absolute;top:0;left:0;right:0;height:20px;display:flex;align-items:center;gap:8px;padding:0 8px;
  font:500 9.5px 'JetBrains Mono',monospace;letter-spacing:.14em;color:var(--micro);text-transform:uppercase;overflow:hidden;white-space:nowrap}
.tile{position:absolute;border-radius:6px;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:1px;
  cursor:pointer;overflow:hidden;animation:tin .5s both;
  transition:transform .16s,opacity .35s,box-shadow .45s,filter .35s}
.tile:hover{transform:scale(1.04);z-index:6}
.tile.dim{opacity:.13;pointer-events:none}
.tile.pulse{box-shadow:0 0 24px 0 rgba(var(--c),.5)}
.tile.trig{animation:tin .5s both, trigGlow 2.6s 1s infinite}
.tile .tk{font-family:'JetBrains Mono',monospace;font-weight:700;line-height:1.1}
.tile .sc{font-family:'JetBrains Mono',monospace;font-weight:500;line-height:1.1}
.tile .pp{font:500 9px 'JetBrains Mono',monospace;opacity:.75}
@keyframes tin{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}
@keyframes trigGlow{0%,100%{box-shadow:0 0 0 0 rgba(53,224,143,.28)}50%{box-shadow:0 0 26px 2px rgba(53,224,143,.5)}}
@keyframes blip{0%,100%{box-shadow:0 0 0 0 rgba(63,193,171,.5)}50%{box-shadow:0 0 0 7px rgba(63,193,171,0)}}
@keyframes livedot{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes riseIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

/* ---------- floating tip ---------- */
#tip{position:fixed;z-index:60;max-width:250px;padding:9px 11px;border-radius:8px;background:#0a0f14;border:1px solid var(--line);
  color:var(--dim);font-size:11.5px;line-height:1.45;pointer-events:none;opacity:0;transition:opacity .12s;box-shadow:0 8px 24px rgba(0,0,0,.55)}
#tip b{color:var(--txt);font-family:'JetBrains Mono',monospace}

/* ---------- side panel ---------- */
#panel{position:fixed;top:0;right:0;bottom:0;width:372px;max-width:92vw;background:var(--panelbg);border-left:1px solid var(--line);
  transform:translateX(102%);transition:transform .28s cubic-bezier(.2,.8,.2,1);z-index:40;display:flex;flex-direction:column;box-shadow:-18px 0 50px rgba(0,0,0,.5)}
#panel.open{transform:translateX(0)}
.p-head{display:flex;align-items:center;gap:12px;padding:16px 18px 12px;border-bottom:1px solid var(--line2)}
.p-tk{font:700 18px 'JetBrains Mono',monospace}
.p-name{font-size:12px;color:var(--dim)}
.p-x{margin-left:auto;color:var(--micro);font-size:18px;padding:4px 8px;border-radius:6px}
.p-x:hover{color:var(--txt);background:var(--hover)}
.p-body{padding:16px 18px;overflow-y:auto;display:flex;flex-direction:column;gap:16px;animation:riseIn .3s both}
.p-toprow{display:flex;align-items:center;gap:16px}
.ringwrap{position:relative;width:64px;height:64px;flex:none}
.ringwrap svg{transform:rotate(-90deg)}
.ringval{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font:700 15px 'JetBrains Mono',monospace}
.p-kv{display:grid;grid-template-columns:1fr 1fr;gap:9px 14px;flex:1}
.kv .l{font:500 9px 'JetBrains Mono',monospace;letter-spacing:.13em;color:var(--micro)}
.kv .v{font:500 13px 'JetBrains Mono',monospace;margin-top:1px}
.stagechip{display:inline-flex;align-items:center;gap:6px;padding:3px 9px;border-radius:6px;font:500 10px 'JetBrains Mono',monospace;letter-spacing:.12em}
.p-spark{border:1px solid var(--line2);border-radius:8px;padding:8px 8px 4px;background:#0c1219}
.p-spark .cap{font:500 9px 'JetBrains Mono',monospace;letter-spacing:.13em;color:var(--micro);padding:0 4px 4px}
.p-crux{border-left:3px solid var(--amber);background:rgba(240,180,41,.07);padding:9px 11px;border-radius:0 8px 8px 0;font-size:12.5px;color:var(--dim);line-height:1.5}
.p-crux b{color:var(--txt);font-weight:600}
.p-actions{display:flex;gap:8px}
.btn{flex:1;text-align:center;padding:9px 12px;border-radius:8px;font-size:13px;font-weight:600;transition:background .15s,border-color .15s}
.btn.pri{background:var(--mint);color:var(--on-accent)}
.btn.pri:hover{background:var(--mint2)}
.btn.sec{border:1px solid #1f2a36;color:var(--dim)}
.btn.sec:hover{border-color:var(--mint);color:var(--txt)}

/* ---------- toast + badge ---------- */
#toast{position:fixed;left:50%;bottom:26px;transform:translate(-50%,16px);background:#0a0f14;border:1px solid var(--line);color:var(--dim);
  padding:9px 16px;border-radius:9px;font-size:12.5px;opacity:0;transition:all .25s;z-index:70;pointer-events:none;box-shadow:0 8px 24px rgba(0,0,0,.5)}
#toast.show{opacity:1;transform:translate(-50%,0)}
.badge{position:fixed;left:14px;bottom:12px;font:500 9px 'JetBrains Mono',monospace;letter-spacing:.14em;color:#3c4a58;z-index:5}
</style>
</head>
<body>

<header>
  <div class="brand"><span class="logo-dot"></span>BreakoutAI<span class="sub">MARKET&nbsp;MAP</span></div>

<div id="toast"></div>

<script>
/* ============ tokens / stages ============ */
const STAGES=[
  {k:"BASE",        c:"#5b7391", d:"building structure"},
  {k:"CONTRACTION", c:"#7c6cf2", d:"swings narrowing"},
  {k:"TIGHTENING",  c:"#f0b429", d:"range compressing"},
  {k:"PRE-BREAKOUT",c:"#3fc1ab", d:"at the pivot"},
  {k:"TRIGGERED",   c:"#35e08f", d:"broke out"}
];
const hex2rgb=h=>{const n=parseInt(h.slice(1),16);return[(n>>16)&255,(n>>8)&255,n&255].join(",")};
const convColor=c=>c>=70?"#3fc1ab":(c>=40?"#f0b429":"#ef6b6b");

/* ============ sample data (illustrative) ============ */
const STOCKS=[
 {t:"MAZDOCK",n:"Mazagon Dock Ship.",s:"Defence",c:78,st:3,p:"5,842",pv:"6,005",pct:-2.7,d:6, crux:"Handle forming on a 9-week cup — needs a +40% volume day through ₹6,005."},
 {t:"BEL",n:"Bharat Electronics",s:"Defence",c:66,st:2,p:"412",pv:"430",pct:-4.1,d:9, crux:"Range compressed to 3.1%; an order-book headline is the likely trigger."},
 {t:"HAL",n:"Hindustan Aeronautics",s:"Defence",c:58,st:1,p:"4,980",pv:"5,350",pct:-6.9,d:14, crux:"Third contraction leg underway; the 21DMA must keep holding."},
 {t:"DATAPATTNS",n:"Data Patterns",s:"Defence",c:44,st:0,p:"2,610",pv:"2,940",pct:-11.2,d:22, crux:"Early base. RS rank still below 70 — on watch, not actionable."},
 {t:"KAYNES",n:"Kaynes Technology",s:"Electronics / EMS",c:82,st:3,p:"6,120",pv:"6,240",pct:-1.9,d:4, crux:"Tightest weekly range in 6 months; needs volume expansion through ₹6,240."},
 {t:"DIXON",n:"Dixon Technologies",s:"Electronics / EMS",c:71,st:2,p:"16,480",pv:"17,020",pct:-3.2,d:7, crux:"Sitting on the 10-week line with shrinking supply; watch for a pocket pivot."},
 {t:"CGPOWER",n:"CG Power & Industrial",s:"Electronics / EMS",c:69,st:2,p:"812",pv:"845",pct:-3.9,d:8, crux:"Higher lows into a flat top — classic ascending triangle near completion."},
 {t:"AMBER",n:"Amber Enterprises",s:"Electronics / EMS",c:63,st:2,p:"7,240",pv:"7,620",pct:-5.0,d:5, crux:"Volume drying up nicely; needs one more shakeout to clear weak hands."},
 {t:"SYRMA",n:"Syrma SGS Tech.",s:"Electronics / EMS",c:52,st:1,p:"610",pv:"666",pct:-8.4,d:11, crux:"Second contraction forming; still wide — patience until sub-5% range."},
 {t:"APLAPOLLO",n:"APL Apollo Tubes",s:"Capital Goods",c:76,st:3,p:"1,745",pv:"1,784",pct:-2.2,d:3, crux:"Three tight weekly closes; institutional accumulation visible in delivery data."},
 {t:"JYOTICNC",n:"Jyoti CNC Automation",s:"Capital Goods",c:73,st:2,p:"1,388",pv:"1,436",pct:-3.4,d:6, crux:"Post-earnings digestion almost done; pivot at all-time-high zone."},
 {t:"POLYCAB",n:"Polycab India",s:"Capital Goods",c:61,st:1,p:"7,380",pv:"7,835",pct:-5.8,d:12, crux:"Contracting after a 30% run; needs RS to stay above sector line."},
 {t:"KEI",n:"KEI Industries",s:"Capital Goods",c:57,st:1,p:"4,420",pv:"4,760",pct:-7.1,d:10, crux:"Mid-base; wide-and-loose action still being worked off."},
 {t:"ELECON",n:"Elecon Engineering",s:"Capital Goods",c:41,st:0,p:"590",pv:"675",pct:-12.6,d:28, crux:"Stale base — day 28. Needs a fresh higher low or it drops off the scan."},
 {t:"BSE",n:"BSE Ltd",s:"Financials",c:84,st:4,p:"2,055",pv:"2,027",pct:1.4,d:1, crux:"Broke out on 2.8× average volume; tracking follow-through to ₹2,140."},
 {t:"CDSL",n:"Central Depository",s:"Financials",c:68,st:2,p:"1,860",pv:"1,946",pct:-4.4,d:7, crux:"Tight flag under highs; demat account growth is the fundamental driver."},
 {t:"MCX",n:"Multi Commodity Exch.",s:"Financials",c:62,st:2,p:"6,930",pv:"7,310",pct:-5.2,d:9, crux:"Compressing under resistance; options-volume cycle turning up."},
 {t:"ANGELONE",n:"Angel One",s:"Financials",c:54,st:1,p:"2,950",pv:"3,206",pct:-8.0,d:13, crux:"Second leg of contraction; broker adds slowing — conviction capped."},
 {t:"POWERINDIA",n:"Hitachi Energy India",s:"Power & Infra",c:70,st:2,p:"14,900",pv:"15,360",pct:-3.0,d:5, crux:"Tightening under ₹15,360 with order inflow tailwind; watch volume."},
 {t:"INOXWIND",n:"Inox Wind",s:"Power & Infra",c:59,st:1,p:"178",pv:"190",pct:-6.5,d:15, crux:"Execution-led rerate; needs one more quiet week."},
 {t:"RVNL",n:"Rail Vikas Nigam",s:"Power & Infra",c:46,st:0,p:"415",pv:"463",pct:-10.4,d:19, crux:"Base still forming after a deep correction; RS recovering."},
 {t:"UNOMINDA",n:"Uno Minda",s:"Auto Ancillaries",c:65,st:2,p:"1,120",pv:"1,175",pct:-4.7,d:8, crux:"EV order wins + tight range; needs market tailwind to trigger."},
 {t:"EXIDEIND",n:"Exide Industries",s:"Auto Ancillaries",c:51,st:1,p:"470",pv:"507",pct:-7.8,d:16, crux:"Li-ion capex story; price action still loose."},
 {t:"SONACOMS",n:"Sona BLW Precision",s:"Auto Ancillaries",c:43,st:0,p:"720",pv:"814",pct:-13.1,d:25, crux:"Early base after downtrend; not yet a setup."}
];

/* ============ squarified treemap ============ */
function worst(row,side){const a=row.map(n=>n._a),s=a.reduce((x,y)=>x+y,0);
  const mx=Math.max.apply(null,a),mn=Math.min.apply(null,a);
  return Math.max((side*side*mx)/(s*s),(s*s)/(side*side*mn));}
function layoutTreemap(items,x,y,w,h){
  const res=[];if(!items.length||w<=0||h<=0)return res;
  items=items.slice().sort((a,b)=>b.area-a.area);
  const total=items.reduce((s,i)=>s+i.area,0),scale=(w*h)/total;
  items.forEach(i=>i._a=i.area*scale);
  let rest=items;
  while(rest.length){
    const vertical=w<h,side=vertical?w:h;
    let row=[rest[0]],i=1,best=worst(row,side);
    while(i<rest.length){const cand=row.concat(rest[i]),wr=worst(cand,side);
      if(wr<=best){row=cand;best=wr;i++}else break;}
    const rowArea=row.reduce((s,n)=>s+n._a,0),thick=side>0?rowArea/side:0;
    let off=0;
    row.forEach(n=>{const len=thick>0?n._a/thick:0;
      if(vertical)res.push({n,x:x+off,y,w:len,h:thick});
      else res.push({n,x,y:y+off,w:thick,h:len});
      off+=len;});
    if(vertical){y+=thick;h-=thick}else{x+=thick;w-=thick}
    rest=rest.slice(row.length);
  }
  return res;
}

/* ============ render ============ */
const map=document.getElementById("map");
const activeStages=new Set(); // empty = all
let tileEls=[];

function render(){
  map.innerHTML="";tileEls=[];
  const W=map.clientWidth,H=map.clientHeight;
  const sectors={};
  STOCKS.forEach(s=>{(sectors[s.s]=sectors[s.s]||[]).push(s)});
  const secItems=Object.keys(sectors).map(name=>({name,stocks:sectors[name],
    area:sectors[name].reduce((t,s)=>t+Math.pow(s.c,1.8),0)}));
  const GAP=5,LBL=20;
  layoutTreemap(secItems,0,0,W,H).forEach(r=>{
    const sec=document.createElement("div");sec.className="sector";
    sec.style.cssText=`left:${r.x+GAP/2}px;top:${r.y+GAP/2}px;width:${r.w-GAP}px;height:${r.h-GAP}px`;
    const lab=document.createElement("div");lab.className="sector-label";
    lab.textContent=r.n.name;sec.appendChild(lab);
    const inner=document.createElement("div");
    inner.style.cssText=`position:absolute;left:0;top:${LBL}px;right:0;bottom:0`;
    sec.appendChild(inner);
    const iw=r.w-GAP,ih=r.h-GAP-LBL;
    layoutTreemap(r.n.stocks.map(s=>({s,area:Math.pow(s.c,1.8)})),0,0,iw,ih).forEach((tr,idx)=>{
      const s=tr.n.s,col=STAGES[s.st].c,rgb=hex2rgb(col);
      const el=document.createElement("div");
      el.className="tile"+(s.st===4?" trig":"");
      el.style.cssText=`left:${tr.x+2}px;top:${tr.y+2}px;width:${tr.w-4}px;height:${tr.h-4}px;`+
        `background:rgba(${rgb},.15);border:1px solid rgba(${rgb},.5);--c:${rgb};animation-delay:${idx*35}ms`;
      const tw=tr.w-4,th=tr.h-4;
      let htm="";
      if(tw>44&&th>26){
        const fs=Math.max(9.5,Math.min(15,tw/7.5));
        htm+=`<span class="tk" style="font-size:${fs}px">${s.t}</span>`;
        if(th>44)htm+=`<span class="sc" style="font-size:${Math.max(9,fs-3)}px;color:${convColor(s.c)}">${s.c}</span>`;
        if(th>66&&tw>76)htm+=`<span class="pp" style="color:${col}">${s.pct>0?"+":""}${s.pct.toFixed(1)}%</span>`;
      }
      el.innerHTML=htm;
      el.dataset.st=s.st;
      el.addEventListener("mousemove",e=>tip(e,s));
      el.addEventListener("mouseleave",hideTip);
      el.addEventListener("click",()=>openPanel(s));
      inner.appendChild(el);tileEls.push(el);
    });
    map.appendChild(sec);
  });
  applyFilter();
}

/* ============ legend / filter ============ */
const legend=document.getElementById("legend");
STAGES.forEach((st,i)=>{
  const n=STOCKS.filter(s=>s.st===i).length;
  const b=document.createElement("button");b.className="lg";
  b.innerHTML=`<i style="background:${st.c}"></i>${st.k} <span style="color:${st.c}">${n}</span>`;
  b.title=st.d;
  b.addEventListener("click",()=>{
    activeStages.has(i)?activeStages.delete(i):activeStages.add(i);
    document.querySelectorAll(".lg").forEach((el,j)=>
      el.classList.toggle("off",activeStages.size>0&&!activeStages.has(j)));
    applyFilter();
  });
  legend.appendChild(b);
});
function applyFilter(){
  tileEls.forEach(el=>el.classList.toggle("dim",
    activeStages.size>0&&!activeStages.has(+el.dataset.st)));
}

/* ============ tooltip ============ */
const tipEl=document.getElementById("tip");
function tip(e,s){
  tipEl.innerHTML=`<b>${s.t}</b> · ${s.n}<br>`+
    `<span style="color:${STAGES[s.st].c}">${STAGES[s.st].k}</span> · day ${s.d} · `+
    `conviction <span style="color:${convColor(s.c)}">${s.c}</span><br>`+
    `₹${s.p} · <b style="color:${s.pct>0?"#35e08f":"#93a5b6"}">${s.pct>0?"+":""}${s.pct.toFixed(1)}%</b> to pivot ₹${s.pv}`;
  tipEl.style.opacity=1;
  const r=tipEl.getBoundingClientRect();
  tipEl.style.left=Math.min(e.clientX+14,innerWidth-r.width-10)+"px";
  tipEl.style.top=Math.min(e.clientY+14,innerHeight-r.height-10)+"px";
}
function hideTip(){tipEl.style.opacity=0}

/* ============ side panel ============ */
const panel=document.getElementById("panel");
function seededRand(seed){let x=seed;return()=>{x=(x*9301+49297)%233280;return x/233280}}
function sparkPath(s){
  const r=seededRand([...s.t].reduce((a,c)=>a+c.charCodeAt(0),7));
  const W=320,H=88,pivotY=24,n=54;let pts=[],y=64;
  for(let i=0;i<n;i++){
    const prog=i/n,decay=1-prog*(0.25+s.st*0.16);
    y+=(r()-0.52)*16*Math.max(.15,decay);
    const target=s.st===4&&prog>.88?14:(pivotY+8+(1-prog)*26);
    y+=(target-y)*0.07;y=Math.max(8,Math.min(H-6,y));
    pts.push([8+(W-16)*prog,y]);
  }
  const line=pts.map((p,i)=>(i?"L":"M")+p[0].toFixed(1)+" "+p[1].toFixed(1)).join("");
  return {line,pivotY,W,H,last:pts[pts.length-1]};
}
function openPanel(s){
  document.getElementById("p-tk").textContent=s.t;
  document.getElementById("p-name").textContent=s.n;
  const col=STAGES[s.st].c,rgb=hex2rgb(col),cc=convColor(s.c);
  const C=2*Math.PI*26,sp=sparkPath(s);
  document.getElementById("p-body").innerHTML=`
    <div class="p-toprow">
      <div class="ringwrap">
        <svg width="64" height="64">
          <circle cx="32" cy="32" r="26" fill="none" stroke="#1c2733" stroke-width="5"/>
          <circle id="ringArc" cx="32" cy="32" r="26" fill="none" stroke="${cc}" stroke-width="5"
            stroke-linecap="round" stroke-dasharray="${C}" stroke-dashoffset="${C}"
            style="transition:stroke-dashoffset .8s cubic-bezier(.2,.8,.2,1)"/>
        </svg>
        <span class="ringval" style="color:${cc}">${s.c}</span>
      </div>
      <div class="p-kv">
        <div class="kv"><div class="l">STAGE</div><div class="v"><span class="stagechip" style="background:rgba(${rgb},.14);color:${col}"><i style="width:6px;height:6px;border-radius:50%;background:${col}"></i>${STAGES[s.st].k}</span></div></div>
        <div class="kv"><div class="l">DAY IN STAGE</div><div class="v">${s.d}</div></div>
        <div class="kv"><div class="l">PRICE</div><div class="v">₹${s.p}</div></div>
        <div class="kv"><div class="l">PIVOT</div><div class="v">₹${s.pv} <span style="color:${s.pct>0?"#35e08f":"#93a5b6"};font-size:11px">${s.pct>0?"+":""}${s.pct.toFixed(1)}%</span></div></div>
      </div>
    </div>
    <div class="p-spark">
      <div class="cap">60-SESSION STRUCTURE · PIVOT ₹${s.pv}</div>
      <svg width="100%" viewBox="0 0 ${sp.W} ${sp.H}" preserveAspectRatio="none" style="display:block">
        <line x1="8" x2="${sp.W-8}" y1="${sp.pivotY}" y2="${sp.pivotY}" stroke="${col}" stroke-width="1" stroke-dasharray="4 4" opacity=".55"/>
        <path d="${sp.line}" fill="none" stroke="${col}" stroke-width="1.8"
          stroke-dasharray="900" stroke-dashoffset="900" style="animation:draw 1.1s .1s forwards"/>
        <circle cx="${sp.last[0]}" cy="${sp.last[1]}" r="3" fill="${col}"/>
      </svg>
    </div>
    <div class="p-crux"><b>Make-or-break:</b> ${s.crux}</div>
    <div class="p-actions">
      <button class="btn pri" data-na>Open full analysis →</button>
      <button class="btn sec" data-na>☆ Track</button>
    </div>`;
  panel.classList.add("open");hideTip();
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    document.getElementById("ringArc").style.strokeDashoffset=C*(1-s.c/100);
  }));
}
document.getElementById("p-x").addEventListener("click",()=>panel.classList.remove("open"));
document.addEventListener("keydown",e=>{if(e.key==="Escape")panel.classList.remove("open")});
const st=document.createElement("style");
st.textContent="@keyframes draw{to{stroke-dashoffset:0}}";document.head.appendChild(st);

/* ============ toast for non-mockup actions ============ */
const toast=document.getElementById("toast");let toastT;
document.addEventListener("click",e=>{
  if(e.target.closest("[data-na]")){
    toast.textContent="Not part of this mockup — Market Map home view only.";
    toast.classList.add("show");clearTimeout(toastT);
    toastT=setTimeout(()=>toast.classList.remove("show"),2200);
  }
});

/* ============ ambience: clock, count-up, live pulse ============ */
const clock=document.getElementById("clock");
setInterval(()=>{clock.textContent=new Date().toLocaleTimeString("en-IN",{timeZone:"Asia/Kolkata",hour12:false})+" IST"},1000);
document.querySelectorAll("[data-count]").forEach(el=>{
  const target=+el.dataset.count,t0=performance.now();
  (function tick(t){const p=Math.min(1,(t-t0)/900),e=1-Math.pow(1-p,3);
    el.textContent=Math.round(target*e).toLocaleString("en-IN");
    if(p<1)requestAnimationFrame(tick);})(t0);
});
setInterval(()=>{
  const vis=tileEls.filter(el=>!el.classList.contains("dim"));
  if(!vis.length)return;
  const el=vis[Math.floor(Math.random()*vis.length)];
  el.classList.add("pulse");setTimeout(()=>el.classList.remove("pulse"),1100);
},1700);

let rz;addEventListener("resize",()=>{clearTimeout(rz);rz=setTimeout(render,120)});
render();
</script>
</body>
</html>
